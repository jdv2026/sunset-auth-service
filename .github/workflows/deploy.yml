name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  version:
      runs-on: ubuntu-latest
      outputs:
        new_version: ${{ steps.bump.outputs.new_version }}
        should_deploy: ${{ steps.bump.outputs.should_deploy }}
      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0  

        - name: Bump version from commit message
          id: bump
          run: |
            COMMIT_MSG=$(git log -1 --pretty=%s)
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            if echo "$COMMIT_MSG" | grep -qi '^\[major\]'; then
              MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            elif echo "$COMMIT_MSG" | grep -qi '^\[minor\]'; then
              MINOR=$((MINOR + 1)); PATCH=0
            elif echo "$COMMIT_MSG" | grep -qi '^\[patch\]'; then
              PATCH=$((PATCH + 1))
            else
              echo "No version prefix — skipping deploy"
              echo "should_deploy=false" >> $GITHUB_OUTPUT
              exit 0
            fi

            NEW_VERSION="v$MAJOR.$MINOR.$PATCH"
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "should_deploy=true" >> $GITHUB_OUTPUT

            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag $NEW_VERSION
            git push origin $NEW_VERSION    
            
  test:
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.should_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, zip, pcntl, pdo, pdo_mysql, openssl

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Create .env
        run: |
          touch .env
          echo "APP_NAME=PersonalHub" >> .env
          echo "APP_ENV=production" >> .env
          echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=http://localhost" >> .env
          echo "APP_LOCALE=en" >> .env
          echo "BCRYPT_ROUNDS=12" >> .env
          echo "LOG_LEVEL=debug" >> .env
          echo "DB_CONNECTION=sqlite" >> .env
          echo "APP_PORT=${{ secrets.APP_PORT }}" >> .env
          echo "AES_KEY=${{ secrets.AES_KEY }}" >> .env
          echo "AES_IV=${{ secrets.AES_IV }}" >> .env
          echo "JWT_PRIVATE_KEY=\"${{ secrets.JWT_PRIVATE_KEY }}\"" >> .env
          echo "JWT_PUBLIC_KEY=\"${{ secrets.JWT_PUBLIC_KEY }}\"" >> .env
          echo "APP_VERSION=${{ needs.version.outputs.new_version }}" >> .env

      - name: Run tests
        run: php artisan test

      - name: Run deploy
        run: php artisan deploy

  deploy:
    runs-on: ubuntu-latest
    needs: [version, test]
    if: needs.version.outputs.should_deploy == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sunset-auth-service-api:latest
            ${{ secrets.DOCKER_USERNAME }}/sunset-auth-service-api:${{ needs.version.outputs.new_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create project directory on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: mkdir -p ${{ secrets.SERVER_PROJECT_PATH }}

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml,docker/nginx/default.conf"
          target: ${{ secrets.SERVER_PROJECT_PATH }}

      - name: Create .env on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            ENV_FILE=${{ secrets.SERVER_PROJECT_PATH }}/.env
            printf '%s\n' \
              'APP_NAME=PersonalHub' \
              'APP_ENV=production' \
              'APP_KEY=${{ secrets.APP_KEY }}' \
              'APP_DEBUG=false' \
              'APP_URL=${{ secrets.APP_URL }}' \
              'APP_LOCALE=en' \
              'BCRYPT_ROUNDS=12' \
              'LOG_CHANNEL=stack' \
              'LOG_LEVEL=info' \
              'DB_CONNECTION=sqlite' \
              'DB_DATABASE=/var/www/html/storage/database.sqlite' \
              'SESSION_DRIVER=database' \
              'SESSION_LIFETIME=120' \
              'QUEUE_CONNECTION=database' \
              'CACHE_STORE=database' \
              'APP_PORT=${{ secrets.APP_PORT }}' \
              'AES_KEY=${{ secrets.AES_KEY }}' \
              'AES_IV=${{ secrets.AES_IV }}' \
              'JWT_PRIVATE_KEY="${{ secrets.JWT_PRIVATE_KEY }}"' \
              'JWT_PUBLIC_KEY="${{ secrets.JWT_PUBLIC_KEY }}"' \
              'DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/sunset-auth-service-api:latest' \
              'APP_VERSION=${{ needs.version.outputs.new_version }}' \
            > "$ENV_FILE"

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ${{ secrets.SERVER_PROJECT_PATH }}
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker tag ${{ secrets.DOCKER_USERNAME }}/sunset-auth-service-api:latest ${{ secrets.DOCKER_USERNAME }}/sunset-auth-service-api:previous || true
            docker compose pull
            docker compose up -d
            sleep 5
            if ! docker compose exec -T app php artisan deploy; then
              echo "Deploy failed, rolling back..."
              docker tag ${{ secrets.DOCKER_USERNAME }}/sunset-auth-service-api:previous ${{ secrets.DOCKER_USERNAME }}/sunset-auth-service-api:latest
              docker compose up -d
              exit 1
            fi
